<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBTI 人格选项解析</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-light: #eef2ff;
            --primary-dark: #4338ca;
            --bg-color: #fcf9f2; /* Warm background like the reference image */
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --border-color: #eeebe3;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Layout */
        .app-container {
            max-width: 600px; /* Optimized for mobile but looks good on desktop too */
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
        }

        .page {
            padding: 20px;
            width: 100%;
            transition: var(--transition);
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            pointer-events: none;
            transform: translateX(20px);
        }

        .page.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0);
            position: relative;
        }

        /* Page 1: Showcase */
        .showcase-header {
            text-align: center;
            padding: 30px 0;
        }

        .showcase-header h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .showcase-header p {
            font-size: 14px;
            color: var(--text-muted);
        }

        .personality-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            padding-bottom: 40px;
        }

        .personality-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow);
            cursor: pointer;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .personality-card:active {
            transform: scale(0.98);
            background-color: var(--primary-light);
        }

        .personality-card img {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            background: #ffffff;
        }

        .personality-card-info {
            flex: 1;
        }

        .personality-card-title {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
        }

        .personality-card-name {
            font-size: 18px;
            font-weight: 700;
        }

        .personality-card-code {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .personality-card-intro {
            font-size: 13px;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Page 2: Details */
        .detail-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 16px;
        }

        .btn-back {
            background: #fff;
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .btn-back:active {
            transform: scale(0.95);
        }

        .detail-hero {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .detail-hero-info {
            flex: 1;
        }

        .detail-hero-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .detail-hero-desc {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .detail-hero-img {
            width: 100px;
            height: 100px;
            border-radius: 16px;
            object-fit: cover;
            box-shadow: var(--shadow);
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin: 24px 0 16px;
            padding-left: 12px;
            border-left: 4px solid var(--primary-color);
        }

        .dimension-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .dimension-card {
            background: #fff;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            font-size: 12px;
        }

        .dimension-name {
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 4px;
        }

        .dimension-text {
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* Path Analysis */
        .analysis-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 40px;
        }

        .analysis-card {
            background: #f1f8f6; /* Light greenish background for questions */
            border-radius: var(--radius);
            padding: 16px;
            border: 1px solid #e0ede9;
        }

        .analysis-q-header {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            gap: 8px;
        }

        .analysis-q-num {
            color: var(--primary-color);
            white-space: nowrap;
        }

        .analysis-option {
            margin-bottom: 12px;
        }

        .analysis-option-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .analysis-option-label {
            color: var(--text-main);
            font-weight: 500;
        }

        .analysis-option-pct {
            font-weight: 700;
            color: var(--text-muted);
        }

        .analysis-bar-bg {
            height: 6px;
            background: #e0e7e4;
            border-radius: 10px;
            overflow: hidden;
        }

        .analysis-bar-fill {
            height: 100%;
            background: #cbd5d0;
            border-radius: 10px;
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .analysis-option.highest .analysis-option-label {
            color: var(--primary-dark);
            font-weight: 700;
        }

        .analysis-option.highest .analysis-option-pct {
            color: var(--primary-color);
        }

        .analysis-option.highest .analysis-bar-fill {
            background: var(--primary-color);
        }

        /* Badge for special questions */
        .badge-special {
            background: var(--primary-color);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 4px;
            vertical-align: middle;
        }

        @media (max-width: 480px) {
            .detail-hero {
                flex-direction: column-reverse;
                align-items: center;
                text-align: center;
            }
            .detail-hero-img {
                width: 120px;
                height: 120px;
                margin-bottom: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Page 1: Personality Showcase -->
        <section id="pageShowcase" class="page active">
            <header class="showcase-header">
                <h1>🔥 SBTI 人格选项解析</h1>
                <p>点击下方的人格，为您展示该人格是基于哪些选项得到的</p>
            </header>
            <div id="personalityList" class="personality-grid">
                <!-- Personality cards will be injected here -->
            </div>
        </section>

        <!-- Page 2: Personality Details -->
        <section id="pageDetail" class="page">
            <header class="detail-header">
                <button class="btn-back" onclick="showPage('pageShowcase')">重新选择</button>
            </header>
            
            <div id="detailContent">
                <!-- Hero section -->
                <div id="detailHero" class="detail-hero">
                    <!-- Injected by JS -->
                </div>

                <h3 class="section-title">人格维度特征</h3>
                <div id="dimensionGrid" class="dimension-grid">
                    <!-- Injected by JS -->
                </div>

                <h3 class="section-title">答题路径分析</h3>
                <div id="analysisContainer" class="analysis-container">
                    <!-- Injected by JS -->
                </div>
            </div>
        </section>
    </div>

    <script>
        // Data from original index.html
        const TYPE_LIBRARY = {
            "CTRL": { "code": "CTRL", "cn": "拿捏者", "intro": "怎么样，被我拿捏了吧？", "desc": "恭喜您，您测出了全中国最为罕见的人格，您是宇宙熵增定律的天然反抗者！全世界所谓成功人士里，99.99%都是您的拙劣模仿者。CTRL人格，是行走的人形自走任务管理器，普通人眼中的“规则”，在您这里只是出厂的基础参数设置；凡人所谓的“计划”，对您而言不过是心血来潮的随手涂鸦。拥有一个CTRL朋友意味着什么？意味着你的人生导航系统会变得更加精准、高效。因为CTRL最会拿捏了。CTRL会在你人生列车即将脱轨的前一秒，用一个“Ctrl+S”帮你硬核存档，再用一套无法拒绝的逻辑把你强行拽回正轨。他们是你混乱生活最后的备份盘，是宇宙崩塌前唯一还亮着的那个重启键。" },
            "ATM-er": { "code": "ATM-er", "cn": "送钱者", "intro": "你以为我很有钱吗？", "desc": "恭喜您，您竟然测出了这个世界上最稀有的人格。您或将成为金融界的未解之谜——是的，ATM-er不一定真的“送钱”，但可能永远在“支付”。支付时间、支付精力、支付耐心、支付一个本该安宁的夜晚。因此像一部老旧但坚固的ATM机，插进去的是别人的焦虑和麻烦，吐出来的是“没事，有我”的安心保证。您的人生就是一场盛大的、无人喝彩的单人付账秀。您竟用磐石般的可靠，承受了瀑布般的索取，偶尔夜深人静才会对着账单——可能是精神上的——发出一声叹息：我这该死的、无处安放的责任心啊。" },
            "Dior-s": { "code": "Dior-s", "cn": "屌丝", "intro": "等着我屌丝逆袭。", "desc": "恭喜！您并非屌丝，您是犬儒主义先贤第欧根尼失散多年的精神传人，因为屌丝的全称是 Diogenes' Original Realist - sage。Dior-s人格，是对当代消费主义陷阱和成功学PUA最彻底的蔑视。他们不是“不求上进”，而是早已看穿一切“上进”的尽头不过是更高级的牢房。屌丝有着大智慧。当别人在追逐风口，被时代的巨浪拍得七荤八素时，Dior-s早已在自己的精神木桶里晒着太阳，达到了“人桶合一”的至高境界。他们信奉的不是空话，是经过亿万次实践检验的物理法则与生物本能：一、躺着比站着舒服；二、饭点到了就得干饭。" },
            "BOSS": { "code": "BOSS", "cn": "领导者", "intro": "方向盘给我，我来开。", "desc": "BOSS是一个手里永远拿着方向盘的人。哪怕油箱已经亮了红灯，哪怕导航在胡说八道，你都会面无表情地说一句：我来开。然后真的把车开到了目的地。该人格拥有独立的物理法则——永恒向上定律。BOSS人格看世界，就像玩通关了的玩家在看新手教程。效率是他们的信仰，秩序是他们的呼吸。他们不是“自带领袖气场”，他们本身就是人形的气场发生器，方圆五米内，空气都会自动变得严肃而高效。他们眼中的“自我突破”，约等于普通人眼中的“自虐”。今天掌握一门新语言，明天考下一个专业证书，后天就计划殖民火星。你说这太卷了，他会用一种看弱鸡的眼神看着你：不是我太狠，是你太松。" },
            "THAN-K": { "code": "THAN-K", "cn": "感恩者", "intro": "我感谢苍天！我感谢大地！", "desc": "恭喜您，您测出了全中国最为罕见的人格。您应当感谢我！感谢您在此刻拥有了生命的滋润！倘若您上班路上堵车了？您也应当说一句：我感谢这次堵车，它让我有更多时间聆听这首美妙的歌曲，并欣赏窗外每一张因焦虑而扭曲的脸庞，让我更珍惜内心的平静。是的，THAN-K拥有温润如玉的性格 and 海纳百川的胸怀。他们眼中的世界没有完全的坏人，只有“尚未被感恩光芒照耀到的朋友”。拥有一个THAN-K朋友，就像身边多了一个永不枯竭的正能量发射塔。TA甚至能帮你从墙角的霉斑里发现一幅梵高风格的星空图。" },
            "OH-NO": { "code": "OH-NO", "cn": "哦不人", "intro": "哦不！我怎么会是这个人格？！", "desc": "“哦不！”并非恐惧的尖叫，而是一种顶级的智慧。当普通人看到一个杯子放在桌沿，哦不人看到的是一场由“水渍-短路-火灾-全楼疏散-经济损失-蝴蝶效应-世界末日”构成的灾难史诗。于是，伴随着一声发自灵魂深处的 Oh, no!，他们会以迅雷不及掩耳之势把杯子挪到桌子正中央，然后再垫上一张吸水杯垫。哦不人对“边界”有一种近乎偏执的尊重：你的就是你的，我的就是我的。所有意外和风险都已经在他的“Oh, no!”声中，被扼杀在了萌芽状态。他们是秩序的守护神，是混乱世界里最后那批神经绷得很直的体面人。" },
            "GOGO": { "code": "GOGO", "cn": "行者", "intro": "gogogo~出发咯", "desc": "经研究发现，GOGO人格的大脑构造与常人有根本性不同。GOGO活在一个极致的“所见即所得”世界里，人生信条简单粗暴到令人发指：只要我闭上眼睛，天就是黑的；只要我把钱都花了，我就没有钱了；只要我站在斑马线上，我现在就是行人了。逻辑完美闭环，根本无法反驳。别人还在为“先有鸡还是先有蛋”而辩论，GOGO行者已经把鸡和蛋一起做成了一盘“鸡生蛋，蛋生鸡之终极奥义盖浇饭”。他们不是在“解决问题”，他们是在“清除待办事项”。对他们来说，世界上只有两种状态：已完成，和即将被我完成。" },
            "SEXY": { "code": "SEXY", "cn": "尤物", "intro": "您就是天生的尤物！", "desc": "当您走进一个房间，照明系统会自动将您识别为天生的尤物，并自觉调暗亮度，以避免能源浪费。当您微笑时，您就变成了微笑着的尤物，周围的空气湿度也会显著下降，因为水蒸气都凝结成了人眼中的爱心。无论是谁，都容易对您的存在产生一种超标的注意力。传说，如果有足够多的SEXY人格聚集在一起开派对，其释放出的综合魅力能量足以暂时扭曲时空结构，让参加者产生“时间变慢了”的幸福错觉。他们不需要卖力表达，很多时候，单是存在本身就已经很像一篇华丽到过分的赋。" },
            "LOVE-R": { "code": "LOVE-R", "cn": "多情者", "intro": "爱意太满，现实显得有点贫瘠。", "desc": "LOVE-R人格像远古神话时代幸存至今的珍稀物种，其存在概率比你在马桶里钓到作者胳膊的概率还低。您简直是这个钢铁森林时代最后的、也是最不合时宜的吟游诗人。因为您的情感处理器不是二进制的，而是彩虹制的。一片落叶，在常人眼里只是“秋天来了”，在LOVE-R眼中，则是一场关于轮回、牺牲与无言之爱的十三幕悲喜剧。您内心世界像一座永不关门的主题公园，一生都在寻找那个能看懂园区地图、并愿意陪你坐旋转木马直到宇宙尽头的灵魂伴侣。" },
            "MUM": { "code": "MUM", "cn": "妈妈", "intro": "或许...我可以叫你妈妈吗....?", "desc": "恭喜您，您测出了全中国最稀有的妈妈人格。是的，在混沌未开、时间尚无姓名之前，在第一颗恒星打出第一个嗝之前，就已经有了妈妈。妈妈人格的底色是温柔，擅长感知情绪，具有超强共情力，知道什么时候该停下来，什么时候该对自己说一句“算了”。妈妈像一个医生，治愈了别人的不开心。只可惜，当妈妈落泪时，TA给自己的药，剂量总是比给别人小一号。MUM对自己的温柔，常常打了折。" },
            "FAKE": { "code": "FAKE", "cn": "伪人", "intro": "已经，没有人类了。", "desc": "SCP基金会紧急报告：项目编号 SCP-CN-████ “伪人”。在社交场合，伪人是八面玲珑的存在，因为他们切换人格面具比切换手机输入法还快。上一秒还是推心置腹的铁哥们模式，下一秒领导来了，瞬间切换成沉稳可靠好员工模式，连脸上的光泽度和卷曲度都会发生微调。你以为你交到了一个真心懂你的朋友？醒醒。你只是幸运地遇到了一个善于伪装、高性能的仿生人罢了。夜深人静时，伪人把面具一层层摘下来，最后才发现，面具下空得很，正是这些面具构成了自己。" },
            "OJBK": { "code": "OJBK", "cn": "无所谓人", "intro": "我说随便，是真的随便。", "desc": "让我们直面这个词的粗犷本质：OJBK。这已经不是一种人格，而是一种统治哲学。当凡人面临“中午吃米饭还是面条”的世纪抉择时，大脑在激烈燃烧卡路里；而OJBK人格，会用一种批阅奏章般的淡然，轻飘飘地吐出两个字：都行。这不是没主见，这是在告诉你：尔等凡俗的选择，于朕而言，皆为蝼蚁。为什么不争执？因为跟草履虫辩论宇宙的未来毫无意义。为什么不较真？因为帝王不会在意脚下的尘埃是往左飘还是往右飘。" },

        // --- Logic ---
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0, 0);
        }

        function generateDistribution(targetIdx, n) {
            const count = Math.max(2, n || 3);
            let weights = new Array(count).fill(12);
            const boost = count === 2 ? 62 : count === 3 ? 65 : 52;
            const safeTargetIdx = targetIdx >= 0 && targetIdx < count ? targetIdx : 0;
            weights[safeTargetIdx] = boost;
            weights = weights.map(w => w + (Math.floor(Math.random() * 9) - 4));
            const total = weights.reduce((a, b) => a + b, 0);
            let percentages = weights.map(w => Math.round((w / total) * 100));
            const currentSum = percentages.reduce((a, b) => a + b, 0);
            if (currentSum !== 100) percentages[safeTargetIdx] += (100 - currentSum);
            return percentages;
        }

        function selectPersonality(code) {
            const type = TYPE_LIBRARY[code];
            const pattern = NORMAL_TYPES.find(t => t.code === code)?.pattern || "MMM-MMM-MMM-MMM-MMM";
            const patternArr = pattern.replace(/-/g, '').split('');

            // Render Hero
            const imageUrl = TYPE_IMAGES[code] || '';
            document.getElementById('detailHero').innerHTML = `
                <div class="detail-hero-info">
                    <div class="detail-hero-title">${type.cn} (${type.code})</div>
                    <div class="detail-hero-desc">${type.desc}</div>
                </div>
                ${imageUrl ? `<img src="${imageUrl}" alt="${type.cn}" class="detail-hero-img">` : ''}
            `;

            // Render Dimensions
            document.getElementById('dimensionGrid').innerHTML = dimensionOrder.map((dim, idx) => {
                const level = patternArr[idx];
                const explanation = DIM_EXPLANATIONS[dim][level];
                return `
                    <div class="dimension-card">
                        <div class="dimension-name">${dimensionMeta[dim].name} (${level})</div>
                        <div class="dimension-text">${explanation}</div>
                    </div>
                `;
            }).join('');

            // Render Path Analysis
            const predictions = questions.map(q => {
                const dimIdx = dimensionOrder.indexOf(q.dim);
                const level = patternArr[dimIdx] || 'M';
                const targetValue = { 'L': 1, 'M': 2, 'H': 3 }[level];
                return { ...q, distribution: generateDistribution(targetValue - 1, q.options.length) };
            });

            // Special logic
            const specials = specialQuestions.map(sq => {
                let targetIdx = 0;
                if (sq.id === 'drink_gate_q1') {
                    if (code === 'DRUNK') targetIdx = 2;
                    else if (['BOSS', 'CTRL', 'GOGO'].includes(code)) targetIdx = 3;
                    else if (['SEXY', 'LOVE-R', 'MUM'].includes(code)) targetIdx = 1;
                    else targetIdx = 0;
                } else if (sq.id === 'drink_gate_q2') {
                    targetIdx = (code === 'DRUNK') ? 1 : 0;
                }
                return { ...sq, distribution: generateDistribution(targetIdx, sq.options.length) };
            });

            const allPreds = [...predictions, ...specials];
            const q1Pred = allPreds.find(p => p.id === 'drink_gate_q1');
            const q1HighestIdx = q1Pred.distribution.indexOf(Math.max(...q1Pred.distribution));
            const showDrinkingQ2 = (q1HighestIdx === 2);

            document.getElementById('analysisContainer').innerHTML = allPreds.map((pred, idx) => {
                if (pred.id === 'drink_gate_q2' && !showDrinkingQ2) return '';
                const highestIndex = pred.distribution.indexOf(Math.max(...pred.distribution));
                return `
                    <div class="analysis-card">
                        <div class="analysis-q-header">
                            <span class="analysis-q-num">Q${idx + 1}</span>
                            <span class="analysis-q-text">${pred.text}${pred.special ? '<span class="badge-special">特殊</span>' : ''}</span>
                        </div>
                        <div class="analysis-options">
                            ${pred.options.map((opt, i) => {
                                const isHighest = i === highestIndex;
                                const pct = pred.distribution[i];
                                return `
                                    <div class="analysis-option ${isHighest ? 'highest' : ''}">
                                        <div class="analysis-option-info">
                                            <span class="analysis-option-label">${opt.label}</span>
                                            <span class="analysis-option-pct">${pct}%</span>
                                        </div>
                                        <div class="analysis-bar-bg">
                                            <div class="analysis-bar-fill" style="width: ${pct}%"></div>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }).join('');

            showPage('pageDetail');
        }

        function init() {
            const listContainer = document.getElementById('personalityList');
            listContainer.innerHTML = Object.values(TYPE_LIBRARY).map(type => `
                <div class="personality-card" onclick="selectPersonality('${type.code}')">
                    <img src="${TYPE_IMAGES[type.code]}" alt="${type.cn}" onerror="this.src='https://via.placeholder.com/80?text=${type.code}'">

                            <span class="personality-card-code">${type.code}</span>
                        </div>

                    </div>
                </div>

        }
